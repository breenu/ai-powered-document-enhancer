# Q5 - DevOps CI/CD Pipeline with Automated Testing
# Tool Used: GitHub Actions
#
# This pipeline automates build, testing, and deployment for the
# AI Document Enhancement System. Automated testing is integrated
# at every stage to ensure software quality.

name: AI Document Enhancer CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.10"

jobs:
  # ═══════════════════════════════════════════════════════════════
  # STAGE 1: LINT & STATIC ANALYSIS
  # ═══════════════════════════════════════════════════════════════
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: pip install flake8 pylint black isort mypy

      - name: Run flake8 (PEP 8 compliance)
        run: flake8 app/ tests/ --max-line-length=120

      - name: Run pylint (code quality score)
        run: pylint app/ --fail-under=7.0

      - name: Check code formatting (black)
        run: black --check app/ tests/

      - name: Check import sorting (isort)
        run: isort --check-only app/ tests/

      - name: Type checking (mypy)
        run: mypy app/ --ignore-missing-imports

  # ═══════════════════════════════════════════════════════════════
  # STAGE 2: UNIT TESTING
  # ═══════════════════════════════════════════════════════════════
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-html

      - name: Run unit tests with coverage
        run: |
          pytest tests/test_mutation.py tests/test_oot.py \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --junitxml=test-results.xml \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: htmlcov/

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: test-results.xml

      - name: Enforce minimum coverage (80%)
        run: |
          pip install coverage
          coverage report --fail-under=80

  # ═══════════════════════════════════════════════════════════════
  # STAGE 3: MUTATION TESTING
  # ═══════════════════════════════════════════════════════════════
  mutation-tests:
    name: Mutation Testing
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install mutmut pytest

      - name: Run mutation testing on order_calculation
        run: |
          mutmut run \
            --paths-to-mutate=app/core/order_calculation.py \
            --tests-dir=tests/ \
            --runner="python -m pytest tests/test_mutation.py -x -q"

      - name: Generate mutation report
        run: mutmut results

      - name: Check mutation score (> 70% killed)
        run: |
          mutmut junitxml > mutation-results.xml
          echo "Mutation testing completed"

  # ═══════════════════════════════════════════════════════════════
  # STAGE 4: UI & INTEGRATION TESTING
  # ═══════════════════════════════════════════════════════════════
  integration-tests:
    name: Integration & UI Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libegl1 libxkbcommon0

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-qt selenium

      - name: Install Chrome for Selenium
        uses: browser-actions/setup-chrome@latest

      - name: Install ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Run UI tests with virtual display
        run: |
          xvfb-run pytest tests/test_ui.py -v --junitxml=ui-test-results.xml

      - name: Upload UI test results
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: ui-test-results.xml

  # ═══════════════════════════════════════════════════════════════
  # STAGE 5: SECURITY TESTING
  # ═══════════════════════════════════════════════════════════════
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run Bandit (security linter)
        run: |
          pip install bandit
          bandit -r app/ -f json -o bandit-report.json || true

      - name: Check for vulnerable dependencies
        run: |
          pip install safety
          pip install -r requirements.txt
          safety check --json --output safety-report.json || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

  # ═══════════════════════════════════════════════════════════════
  # STAGE 6: BUILD & DEPLOY
  # ═══════════════════════════════════════════════════════════════
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [mutation-tests, integration-tests, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller --onefile --windowed main.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: document-enhancer-build
          path: dist/

      - name: Deploy to staging
        run: echo "Deploying to staging environment..."

      - name: Run smoke tests on staging
        run: |
          echo "Running post-deployment smoke tests..."
          pytest tests/test_mutation.py -v -k "test_total_order_simple" --tb=short
